name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # npm install statt npm ci: package-lock.json kann hier nicht lokal neu
      # generiert werden (kein Node/npm verfügbar), daher gerät sie nach
      # Dependency-Änderungen leicht außer Sync. npm install löst das live auf
      # (etwas weniger strikt reproduzierbar als ci, für dieses Projekt ok).
      - run: npm install
      - run: npm test

      - name: Vorwärts-Referenzen-Audit (informativ, blockiert nicht)
        run: npm run audit
        continue-on-error: true

      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
